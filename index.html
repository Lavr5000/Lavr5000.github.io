<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Денис Лавров — Автоматизация строительства и AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script type="module" src="https://unpkg.com/@google/model-viewer@3.5.0/dist/model-viewer.min.js"></script>

<style>
:root {
  --bg: #08080B;
  --bg-elev: #0D0D11;
  --bg-card: #101015;
  --bg-card-hover: #14141B;
  --border: #1C1C24;
  --border-strong: #25252F;
  --text: #EDEDEF;
  --text-2: #A1A1AA;
  --text-3: #6B6B75;
  --accent: #FF6B35;
  --accent-2: #FF9770;
  --accent-soft: rgba(255,107,53,0.12);
  --accent-glow: rgba(255,107,53,0.35);
  --red: #F87171;
  --green: #7DD87D;
  --amber: #F5B94F;
  --radius: 10px;
  --radius-lg: 16px;
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
  --container: 1180px;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; overflow-x: hidden; }
body { background: var(--bg); color: var(--text); font-family: var(--font-sans); font-size: 16px; line-height: 1.55; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; letter-spacing: -0.005em; }
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; }
::selection { background: var(--accent); color: white; }
.section { max-width: var(--container); margin: 0 auto; padding: 120px 32px; border-top: 1px solid var(--border); }
.section:first-of-type { border-top: none; }
@media (max-width: 768px) { .section { padding: 80px 20px; } }

/* Nav */
.nav { position: fixed; top: 0; left: 0; right: 0; z-index: 50; transition: background 0.2s, border-color 0.2s; border-bottom: 1px solid transparent; }
.nav-scrolled { background: rgba(8,8,11,0.72); backdrop-filter: saturate(180%) blur(12px); -webkit-backdrop-filter: saturate(180%) blur(12px); border-bottom-color: var(--border); }
.nav-inner { max-width: var(--container); margin: 0 auto; padding: 14px 32px; display: flex; align-items: center; gap: 32px; }
.nav-logo { display: flex; align-items: center; gap: 10px; font-weight: 500; }
.logo-mark { width: 26px; height: 26px; display: grid; place-items: center; background: var(--accent); color: white; border-radius: 6px; font-family: var(--font-mono); font-size: 11px; font-weight: 700; box-shadow: 0 0 24px var(--accent-glow); }
.logo-text { font-size: 14px; }
.nav-links { display: flex; gap: 28px; margin-left: auto; }
.nav-links a { font-size: 13px; color: var(--text-2); transition: color 0.15s; }
.nav-links a:hover { color: var(--text); }
.nav-actions { display: flex; align-items: center; gap: 12px; }
.lang-toggle { display: flex; background: var(--bg-card); border: 1px solid var(--border); border-radius: 7px; padding: 2px; }
.lang-toggle button { background: transparent; color: var(--text-2); border: 0; font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.04em; padding: 4px 8px; border-radius: 5px; transition: background 0.15s, color 0.15s; }
.lang-toggle button.on { background: var(--border-strong); color: var(--text); }
@media (max-width: 900px) { .nav-links { display: none; } }

/* Buttons */
.btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 16px; border-radius: 8px; font-size: 14px; font-weight: 500; transition: all 0.15s; border: 1px solid transparent; white-space: nowrap; }
.btn-sm { padding: 7px 12px; font-size: 13px; }
.btn-lg { padding: 14px 22px; font-size: 15px; }
.btn-primary { background: var(--accent); color: white; box-shadow: 0 0 0 1px rgba(255,255,255,0.05) inset, 0 8px 24px -8px var(--accent-glow); }
.btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); }
.btn-ghost { background: transparent; color: var(--text); border-color: var(--border-strong); }
.btn-ghost:hover { background: var(--bg-card); border-color: var(--text-3); }

/* Typography */
.kicker { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em; color: var(--text-3); margin-bottom: 24px; text-transform: uppercase; }
.eyebrow { display: inline-flex; align-items: center; gap: 8px; font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em; color: var(--text-2); background: var(--bg-card); border: 1px solid var(--border); padding: 6px 10px; border-radius: 100px; margin-bottom: 28px; text-transform: uppercase; }
.pulse { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 0 0 var(--accent-glow); animation: pulse 2s infinite; }
@keyframes pulse { 0% { box-shadow: 0 0 0 0 var(--accent-glow); } 70% { box-shadow: 0 0 0 10px transparent; } 100% { box-shadow: 0 0 0 0 transparent; } }
.display { font-size: clamp(42px, 6vw, 76px); line-height: 1.02; letter-spacing: -0.035em; font-weight: 500; margin: 0 0 24px; }
.display-xl { font-size: clamp(48px, 7.5vw, 96px); }
.accent-gradient { background: linear-gradient(180deg, #EDEDEF 0%, var(--accent-2) 110%); -webkit-background-clip: text; background-clip: text; color: transparent; }
.h2 { font-size: clamp(30px, 3.6vw, 46px); line-height: 1.1; letter-spacing: -0.025em; font-weight: 500; margin: 0 0 24px; max-width: 840px; text-wrap: pretty; }
.lede { font-size: 18px; line-height: 1.6; color: var(--text-2); max-width: 680px; margin: 0 0 40px; text-wrap: pretty; }

/* Hero */
.hero { position: relative; padding: 160px 32px 80px; max-width: var(--container); margin: 0 auto; overflow: hidden; }
.hero-inner { position: relative; z-index: 1; display: grid; grid-template-columns: 1.1fr 1fr; gap: 64px; align-items: center; }
.hero-inner.center { grid-template-columns: 1fr; text-align: center; justify-items: center; }
.hero-inner.center .hero-sub, .hero-inner.center .display { max-width: 1000px; }
.hero-inner.center .metrics { margin-top: 48px; }
.grid-bg { position: absolute; inset: 0; background-image: linear-gradient(rgba(255,107,53,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(255,107,53,0.05) 1px, transparent 1px); background-size: 64px 64px; mask-image: radial-gradient(ellipse at 30% 20%, black 0%, transparent 70%); -webkit-mask-image: radial-gradient(ellipse at 30% 20%, black 0%, transparent 70%); pointer-events: none; }
.hero-sub { font-size: 19px; color: var(--text-2); max-width: 560px; margin: 0 0 32px; text-wrap: pretty; }
.hero-ctas { display: flex; gap: 12px; margin-bottom: 56px; flex-wrap: wrap; }
.metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px; padding-top: 32px; border-top: 1px solid var(--border); max-width: 560px; }
.hero-inner.center .metrics { max-width: 720px; width: 100%; }
.metric-val { font-size: 32px; font-weight: 500; letter-spacing: -0.02em; color: var(--text); font-feature-settings: 'tnum'; }
.metric-label { font-size: 12px; color: var(--text-3); margin-top: 2px; text-wrap: balance; }
@media (max-width: 900px) { .hero-inner { grid-template-columns: 1fr; } .hero { padding-top: 120px; } }
@media (max-width: 768px) {
  .hero { padding: 120px 16px 60px; }
  .hero-inner.center .display, .hero-inner.center .hero-sub { max-width: 100%; }
  .display { font-size: clamp(32px, 8vw, 48px); letter-spacing: -0.02em; }
  .display-xl { font-size: clamp(36px, 9vw, 56px); }
  .hero-sub { font-size: 16px; margin-bottom: 24px; }
  .hero-ctas { width: 100%; }
  .hero-ctas .btn { flex: 1 1 auto; justify-content: center; text-align: center; }
}
@media (max-width: 480px) {
  .hero { padding: 100px 12px 48px; }
  .display { font-size: clamp(28px, 9vw, 40px); }
  .display-xl { font-size: clamp(32px, 10vw, 48px); }
  .eyebrow { font-size: 11px; }
}

/* Robot */
.robot-stage { width: 100%; max-width: 520px; margin: 56px auto 0; aspect-ratio: 1 / 0.85; position: relative; perspective: 900px; }
.robot-stage.inline { margin: 0; }
.robot-glow { position: absolute; inset: 10% 10% 0 10%; background: radial-gradient(ellipse at 50% 50%, var(--accent-glow) 0%, transparent 60%); filter: blur(40px); pointer-events: none; }
/* model-viewer robot */
.mv-robot { width: 100%; height: 100%; position: absolute; inset: 0; background: transparent; opacity: 0; transition: opacity 0.7s ease; --poster-color: transparent; --poster-image: none; }
.mv-robot.ready { opacity: 1; }
.mv-robot::part(default-progress-bar) { display: none !important; }
.mv-robot::part(default-poster) { display: none !important; background: transparent !important; }
.mv-error-state { position: absolute; inset: 0; display: grid; place-items: center; font-family: var(--font-mono); color: var(--text-3); gap: 10px; text-align: center; }
.mv-error-icon { width: 40px; height: 40px; border-radius: 50%; border: 1.5px solid var(--text-3); display: grid; place-items: center; font-size: 22px; font-weight: 500; opacity: 0.5; }
.mv-error-text { font-size: 12px; letter-spacing: 0.04em; text-transform: uppercase; opacity: 0.6; }

/* System diagram */
.sys-diagram { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; font-family: var(--font-mono); font-size: 11px; box-shadow: 0 40px 80px -40px rgba(0,0,0,0.8), 0 0 60px -20px var(--accent-glow); }
.sys-diagram.wide { width: 100%; max-width: 880px; margin: 64px auto 0; }
.sys-head { display: flex; align-items: center; gap: 8px; padding: 10px 14px; border-bottom: 1px solid var(--border); color: var(--text-3); letter-spacing: 0.02em; }
.sys-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); }
.sys-badge { margin-left: auto; background: rgba(125,216,125,0.1); color: var(--green); padding: 2px 8px; border-radius: 100px; font-size: 10px; }
.sys-body { display: flex; align-items: center; gap: 12px; padding: 28px 20px; }
.node { background: var(--bg-elev); border: 1px solid var(--border-strong); border-radius: 10px; padding: 14px; display: flex; flex-direction: column; gap: 4px; min-width: 110px; transition: border-color 0.2s; }
.node-core { border-color: var(--accent); background: linear-gradient(180deg, var(--accent-soft), transparent); box-shadow: 0 0 32px -8px var(--accent-glow); }
.node-code { font-size: 10px; color: var(--text-3); letter-spacing: 0.08em; }
.node-core .node-code { color: var(--accent-2); }
.node-name { font-family: var(--font-sans); font-size: 13px; color: var(--text); font-weight: 500; }
.node-sub { font-size: 10px; color: var(--text-3); }
.node-col { display: flex; flex-direction: column; gap: 8px; flex: 1; }
.node-col .node { min-width: 0; padding: 10px 12px; }
.node-out { flex-direction: row; justify-content: space-between; align-items: center; }
.flow { position: relative; flex: 1; height: 1px; min-width: 24px; }
.flow-line { position: absolute; inset: 0; background: linear-gradient(90deg, var(--border-strong), var(--accent), var(--border-strong)); }
.flow-dot { position: absolute; top: -2px; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent-glow); animation: flowMove 2.4s linear infinite; }
.flow-dot.d2 { animation-delay: 1.2s; }
@keyframes flowMove { 0% { left: 0%; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { left: 100%; opacity: 0; } }
@media (max-width: 640px) { .sys-body { flex-direction: column; align-items: stretch; } .flow { width: 1px; height: 24px; } .flow-line { width: 1px; height: 100%; background: linear-gradient(180deg, var(--border-strong), var(--accent), var(--border-strong)); } .flow-dot { top: 0; left: -2px !important; animation-name: flowMoveV; } @keyframes flowMoveV { 0% { top: 0; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { top: 100%; opacity: 0; } } .node-col { width: 100%; } }

/* Pillars */
.pillars { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-top: 24px; }
.pillar { background: var(--bg-card); padding: 28px; transition: background 0.2s; }
.pillar:hover { background: var(--bg-card-hover); }
.pillar-label { font-family: var(--font-mono); font-size: 11px; color: var(--accent-2); letter-spacing: 0.04em; margin-bottom: 12px; text-transform: uppercase; }
.pillar-text { color: var(--text-2); font-size: 15px; }
@media (max-width: 800px) { .pillars { grid-template-columns: 1fr; } }

/* Projects */
.projects-wrap { display: grid; grid-template-columns: 1.05fr 1fr; gap: 40px; margin-top: 24px; align-items: flex-start; }
.projects-list { display: flex; flex-direction: column; border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; background: var(--bg-card); }
.project-row { all: unset; display: grid; grid-template-columns: auto 1fr auto auto auto; align-items: center; gap: 14px; padding: 18px 20px; cursor: pointer; border-bottom: 1px solid var(--border); transition: background 0.15s; color: var(--text-2); position: relative; }
.project-row:last-child { border-bottom: none; }
.project-row:hover { background: var(--bg-card-hover); color: var(--text); }
.project-row.active { background: var(--bg-card-hover); color: var(--text); }
.project-row.active .project-arrow { color: var(--accent-2); transform: translateX(2px); }
.project-row.active::after {
  content: '';
  position: absolute;
  right: -40px;
  top: 50%;
  width: 40px;
  height: 1.5px;
  background: linear-gradient(90deg, var(--accent) 0%, transparent 100%);
  transform: translateY(-50%);
  animation: pc-grow 0.25s ease-out;
  z-index: 2;
}
@keyframes pc-grow { from { width: 0; } to { width: 40px; } }
/* hint pulse on first inactive row */
.projects-list .project-row:nth-child(2):not(.active).hint-pulse {
  animation: rowHint 2.4s ease-in-out 2;
  animation-delay: 0.6s;
}
@keyframes rowHint {
  0%, 100% { background: transparent; }
  50% { background: rgba(255,107,53,0.08); }
}
.projects-hint {
  font-family: var(--font-mono); font-size: 11px; color: var(--text-3);
  letter-spacing: 0.04em; text-transform: uppercase; margin-top: 12px;
  padding-left: 4px; opacity: 0.6; transition: opacity 0.3s;
}
.projects-hint.hidden { opacity: 0; pointer-events: none; }

/* Project mockup */
.project-mockup { margin: 0 0 24px; border-radius: 10px; overflow: hidden; background: #05050a; border: 1px solid var(--border-strong); }
.mockup-chrome { display: flex; align-items: center; gap: 6px; padding: 9px 12px; background: #0b0b12; border-bottom: 1px solid var(--border); }
.mockup-dot { width: 10px; height: 10px; border-radius: 50%; }
.mockup-dot.r { background: #ff5f56; } .mockup-dot.y { background: #ffbd2e; } .mockup-dot.g { background: #27c93f; }
.mockup-title { font-family: var(--font-mono); font-size: 11px; color: var(--text-3); margin-left: 8px; }
.mockup-body { padding: 16px 18px; font-family: var(--font-mono); font-size: 12px; line-height: 1.65; color: var(--text-2); min-height: 120px; }
.mockup-prompt { color: var(--accent-2); margin-right: 8px; }
.mockup-cmd { color: var(--text); }
.mockup-out { color: var(--text-3); }
.mockup-out.ok { color: var(--green); }
.mockup-out.warn { color: var(--amber); }

/* Phone mockup for Apartment Auditor */
.phone-mockup { padding: 18px; background: linear-gradient(180deg, #0b0b12 0%, #05050a 100%); display: flex; justify-content: center; }
.phone-frame { width: 200px; background: #0f0f18; border-radius: 22px; border: 1px solid var(--border-strong); overflow: hidden; padding: 10px 10px; box-shadow: 0 20px 40px -10px rgba(0,0,0,0.6); }
.phone-notch { height: 14px; display: flex; justify-content: center; align-items: center; }
.phone-notch::before { content: ''; width: 40px; height: 4px; border-radius: 100px; background: #000; }
.phone-screen { background: #101018; border-radius: 12px; padding: 12px; font-family: var(--font-mono); }
.phone-title { font-size: 11px; color: var(--text); letter-spacing: 0.02em; margin-bottom: 8px; font-weight: 500; }
.phone-sub { font-size: 9px; color: var(--text-3); margin-bottom: 10px; }
.phone-row { display: flex; align-items: center; gap: 6px; padding: 6px 0; border-top: 1px solid rgba(255,255,255,0.05); font-size: 10px; color: var(--text-2); }
.phone-row:first-of-type { border-top: none; }
.phone-check { width: 10px; height: 10px; border-radius: 3px; border: 1px solid var(--text-3); flex-shrink: 0; }
.phone-check.ok { background: var(--green); border-color: var(--green); }
.phone-check.warn { background: var(--amber); border-color: var(--amber); }
.phone-cta { margin-top: 10px; padding: 7px; background: var(--accent); color: #fff; text-align: center; border-radius: 6px; font-size: 9px; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 500; }

/* Telegram mockup */
.tg-mockup { padding: 14px; background: #0f0f18; }
.tg-msg { background: #1a1a24; padding: 8px 12px; border-radius: 10px 10px 10px 2px; margin-bottom: 8px; max-width: 80%; font-size: 11px; color: var(--text-2); }
.tg-msg.me { background: #2b5278; color: #fff; margin-left: auto; border-radius: 10px 10px 2px 10px; }
.tg-time { font-size: 9px; color: var(--text-3); margin-top: 3px; text-align: right; }

/* Project nav (prev/next) */
.project-nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border); }
.pn-btn { all: unset; cursor: pointer; font-family: var(--font-mono); font-size: 12px; color: var(--text-3); letter-spacing: 0.04em; text-transform: uppercase; padding: 8px 12px; border-radius: 6px; transition: all 0.15s; }
.pn-btn:hover { color: var(--accent-2); background: var(--accent-soft); }
.project-progress { font-family: var(--font-mono); font-size: 11px; color: var(--text-3); letter-spacing: 0.04em; margin-left: auto; }
.project-progress .pp-cur { color: var(--accent-2); font-weight: 600; }
.project-code { font-family: var(--font-mono); font-size: 11px; color: var(--text-3); letter-spacing: 0.04em; }
.project-name { font-size: 15px; font-weight: 500; color: var(--text); }
.project-tag { font-family: var(--font-mono); font-size: 10px; color: var(--text-3); letter-spacing: 0.04em; text-transform: uppercase; }
.project-status { font-family: var(--font-mono); font-size: 10px; padding: 3px 8px; border-radius: 100px; letter-spacing: 0.04em; border: 1px solid; white-space: nowrap; }
.project-status.s-production { color: var(--green); border-color: rgba(125,216,125,0.3); background: rgba(125,216,125,0.08); }
.project-status.s-beta { color: var(--amber); border-color: rgba(245,185,79,0.3); background: rgba(245,185,79,0.08); }
.project-status.s-dev { color: var(--accent-2); border-color: rgba(255,151,112,0.3); background: rgba(255,107,53,0.08); }
.project-status.s-planned { color: var(--text-2); border-color: var(--border-strong); background: var(--bg-elev); }
.project-arrow { color: var(--text-3); font-size: 14px; transition: all 0.15s; }
.project-detail { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 32px; position: sticky; top: 80px; animation: fadeIn 0.3s ease; scroll-margin-top: 88px; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
.project-detail-head { display: flex; gap: 16px; align-items: center; margin-bottom: 28px; }
.project-code-lg { width: 48px; height: 48px; display: grid; place-items: center; background: var(--accent-soft); color: var(--accent-2); border-radius: 10px; font-family: var(--font-mono); font-size: 13px; font-weight: 600; }
.project-title { font-size: 24px; font-weight: 500; margin: 0 0 4px; letter-spacing: -0.02em; }
.project-blocks { display: flex; flex-direction: column; gap: 16px; }
.pb { padding: 16px 18px; border-radius: 10px; background: var(--bg-elev); border: 1px solid var(--border); }
.pb-label { display: flex; align-items: center; gap: 8px; font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.04em; text-transform: uppercase; margin-bottom: 8px; }
.pb-mark { width: 6px; height: 6px; border-radius: 2px; }
.pb-red .pb-label { color: var(--red); } .pb-red .pb-mark { background: var(--red); }
.pb-purple .pb-label { color: var(--accent-2); } .pb-purple .pb-mark { background: var(--accent-2); }
.pb-green .pb-label { color: var(--green); } .pb-green .pb-mark { background: var(--green); }
.pb-text { color: var(--text); font-size: 14px; line-height: 1.55; }
@media (max-width: 960px) { .projects-wrap { grid-template-columns: 1fr; } .project-detail { position: static; } .project-row { grid-template-columns: auto 1fr auto; } .project-tag, .project-arrow { display: none; } .project-row.active::after { display: none; } .phone-frame { width: 180px; } }

/* System thinking */
.principles { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-top: 24px; }
.principle { background: var(--bg-card); padding: 36px 32px; min-height: 240px; position: relative; }
.principle-n { font-family: var(--font-mono); font-size: 12px; color: var(--accent-2); letter-spacing: 0.06em; margin-bottom: 48px; }
.principle-name { font-size: 22px; font-weight: 500; letter-spacing: -0.02em; margin-bottom: 12px; }
.principle-text { color: var(--text-2); font-size: 15px; }
@media (max-width: 800px) { .principles { grid-template-columns: 1fr; } }

/* Stack */
.stack-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; margin-top: 24px; }
.stack-group { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; transition: border-color 0.2s, background 0.2s; }
.stack-group:hover { border-color: var(--border-strong); background: var(--bg-card-hover); }
.stack-group-name { font-family: var(--font-mono); font-size: 11px; color: var(--accent-2); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
.stack-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 10px; }
.stack-list li { display: flex; align-items: center; gap: 10px; font-size: 14px; color: var(--text); }
.stack-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--text-3); flex-shrink: 0; }
@media (max-width: 1000px) { .stack-grid { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 600px) { .stack-grid { grid-template-columns: repeat(2, 1fr); } }

/* Gov */
.gov-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; align-items: start; }
.gov-list { list-style: none; padding: 0; margin: 0; border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; background: var(--bg-card); }
.gov-list li { display: flex; gap: 20px; padding: 18px 20px; border-bottom: 1px solid var(--border); font-size: 15px; color: var(--text); align-items: flex-start; transition: background 0.15s; }
.gov-list li:last-child { border-bottom: none; }
.gov-list li:hover { background: var(--bg-card-hover); }
.gov-num { font-family: var(--font-mono); font-size: 11px; color: var(--accent-2); letter-spacing: 0.04em; padding-top: 3px; min-width: 24px; }
@media (max-width: 800px) { .gov-wrap { grid-template-columns: 1fr; } }

/* Demo */
.demo-section .h2 { margin-bottom: 12px; }
.demo-section .lede { margin-bottom: 32px; }
.demo-tabs { display: flex; flex-wrap: wrap; gap: 8px; padding: 4px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; margin: 0 0 24px; }
.demo-tab { flex: 1; min-width: 180px; display: flex; align-items: center; gap: 10px; padding: 12px 14px; background: transparent; border: 1px solid transparent; border-radius: 8px; color: var(--text-2); text-align: left; transition: all 0.18s; }
.demo-tab:hover { color: var(--text); background: var(--bg-elev); }
.demo-tab.on { background: var(--bg); border-color: var(--border-strong); color: var(--text); box-shadow: 0 6px 20px -10px var(--accent-glow); }
.demo-tab-code { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; color: var(--accent-2); padding: 3px 7px; border-radius: 5px; background: var(--accent-soft); }
.demo-tab-name { font-size: 14px; font-weight: 500; }
.demo-tab-hint { font-size: 11px; color: var(--text-3); margin-top: 1px; }
.demo-tab-text { display: flex; flex-direction: column; line-height: 1.2; flex: 1; min-width: 0; }
.demo-sub { font-size: 14px; color: var(--text-2); max-width: 760px; margin: 0 0 20px; text-wrap: pretty; }
.demo-cta-row { display: flex; align-items: center; gap: 14px; margin-top: 24px; flex-wrap: wrap; }
.demo-cta-row .btn-ghost { font-size: 13px; }
.demo-cta-row .note { font-family: var(--font-mono); font-size: 11px; color: var(--text-3); letter-spacing: 0.04em; }

.dot-live { width: 6px; height: 6px; border-radius: 50%; background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulseLive 2s infinite; }
@keyframes pulseLive { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
@keyframes msgIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
@keyframes bounce { 0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }

/* ── Telegram shell ─────────────────────────────────────────────────────── */
.tg-shell { display: grid; grid-template-columns: 280px 1fr; background: #0f1014; border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; box-shadow: 0 40px 90px -40px rgba(0,0,0,0.9), 0 0 60px -30px var(--accent-glow); height: 640px; min-height: 0; }
.tg-shell > * { min-height: 0; min-width: 0; }
@media (max-width: 900px) { .tg-shell { grid-template-columns: 1fr; height: 640px; } .tg-side { display: none; } }
@media (max-width: 768px) {
  .tg-shell { height: auto; min-height: 560px; max-height: 85vh; scroll-margin-top: 88px; }
  .tg-body { min-height: 320px; max-height: 60vh; scroll-margin-top: 88px; }
  .tg-presets { flex-wrap: wrap; }
  .chip { font-size: 12px; padding: 8px 12px; }
}
.tg-side { background: #0b0c10; border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; min-height: 0; }
.tg-side-head { display: flex; align-items: center; gap: 10px; padding: 14px 16px; border-bottom: 1px solid var(--border); }
.tg-side-title { font-size: 13px; font-weight: 600; letter-spacing: -0.01em; }
.tg-side-search { margin: 10px 12px 6px; padding: 8px 12px; background: #15161c; border: 1px solid var(--border); border-radius: 20px; font-family: var(--font-mono); font-size: 11px; color: var(--text-3); display: flex; align-items: center; gap: 8px; }
.tg-side-search::before { content: '⌕'; font-size: 12px; }
.tg-chat { display: flex; gap: 10px; padding: 10px 12px; border-left: 3px solid transparent; cursor: pointer; transition: background 0.15s; }
.tg-chat:hover { background: #14151b; }
.tg-chat.on { background: #191a22; border-left-color: var(--accent); }
.tg-ava { width: 42px; height: 42px; border-radius: 50%; display: grid; place-items: center; color: white; font-weight: 600; font-size: 13px; font-family: var(--font-mono); flex-shrink: 0; }
.tg-chat-body { flex: 1; min-width: 0; }
.tg-chat-top { display: flex; justify-content: space-between; gap: 8px; font-size: 13px; color: var(--text); }
.tg-chat-name { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tg-chat-time { font-size: 10px; color: var(--text-3); font-family: var(--font-mono); flex-shrink: 0; }
.tg-chat-bot { display: flex; justify-content: space-between; gap: 8px; font-size: 12px; color: var(--text-3); margin-top: 2px; }
.tg-chat-preview { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tg-chat-badge { background: var(--accent); color: white; font-size: 10px; font-family: var(--font-mono); padding: 1px 6px; border-radius: 100px; min-width: 18px; text-align: center; }

.tg-main { display: flex; flex-direction: column; background-color: #0f1014; background-image: radial-gradient(circle at 12% 18%, rgba(124,92,255,0.05) 0, transparent 40%), radial-gradient(circle at 82% 72%, rgba(255,107,53,0.05) 0, transparent 40%); min-height: 0; overflow: hidden; }
.tg-head { display: flex; align-items: center; gap: 12px; padding: 12px 18px; border-bottom: 1px solid var(--border); background: #14151b; }
.tg-head-meta { flex: 1; }
.tg-head-name { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
.tg-check { color: var(--accent-2); font-size: 11px; }
.tg-head-sub { font-size: 11px; color: var(--green); font-family: var(--font-mono); display: flex; align-items: center; gap: 6px; }
.tg-head-icons { display: flex; gap: 14px; color: var(--text-3); font-size: 14px; }

.tg-body { flex: 1; overflow-y: auto; padding: 18px 18px 12px; display: flex; flex-direction: column; gap: 8px; scrollbar-width: thin; scrollbar-color: var(--border-strong) transparent; scroll-behavior: smooth; min-height: 0; }
.tg-body::-webkit-scrollbar { width: 6px; }
.tg-body::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }
.tg-day { align-self: center; font-family: var(--font-mono); font-size: 10px; color: var(--text-3); background: rgba(21,22,28,0.85); padding: 3px 10px; border-radius: 100px; margin: 4px 0; }

.tg-msg { display: flex; max-width: 85%; }
.tg-msg.in { align-self: flex-start; }
.tg-msg.out { align-self: flex-end; }
.tg-bubble { padding: 9px 12px; border-radius: 14px; font-size: 13.5px; line-height: 1.5; position: relative; animation: msgIn 0.22s ease; }
.tg-msg.in .tg-bubble { background: #1d1e26; color: var(--text); border-bottom-left-radius: 4px; }
.tg-msg.out .tg-bubble { background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #fff; border-bottom-right-radius: 4px; box-shadow: 0 8px 24px -12px var(--accent-glow); }
.tg-bubble.system { background: rgba(29,30,38,0.6); color: var(--text-2); font-size: 12.5px; }
.tg-bubble-meta { display: flex; align-items: center; gap: 4px; justify-content: flex-end; font-family: var(--font-mono); font-size: 10px; color: rgba(255,255,255,0.8); margin-top: 4px; }
.tg-msg.in .tg-bubble-meta { color: var(--text-3); }
.tg-voice { display: flex; align-items: center; gap: 12px; min-width: 220px; }
.tg-voice-play { width: 34px; height: 34px; border-radius: 50%; background: rgba(255,255,255,0.22); border: 0; color: #fff; display: grid; place-items: center; font-size: 12px; flex-shrink: 0; }
.tg-voice-wave { display: flex; align-items: center; gap: 2px; flex: 1; height: 24px; }
.tg-voice-wave span { flex: 1; background: rgba(255,255,255,0.8); border-radius: 2px; }
.tg-voice-wave.playing span { animation: wave 1.2s ease-in-out infinite; }
@keyframes wave { 0%, 100% { height: 30%; } 50% { height: 100%; } }
.tg-voice-meta { font-family: var(--font-mono); font-size: 10px; opacity: 0.9; white-space: nowrap; }
.tg-reply { background: rgba(255,255,255,0.08); border-left: 2px solid rgba(255,255,255,0.35); padding: 4px 8px; border-radius: 4px; margin-bottom: 6px; font-size: 11px; opacity: 0.9; }
.tg-msg.in .tg-reply { background: rgba(124,92,255,0.12); border-left-color: var(--accent-2); }

.tg-typing { display: inline-flex; align-items: center; gap: 5px; padding: 9px 14px; background: #1d1e26; border-radius: 14px; border-bottom-left-radius: 4px; width: fit-content; }
.tg-typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-2); animation: bounce 1.2s infinite ease-in-out; }
.tg-typing span:nth-child(2) { animation-delay: 0.15s; }
.tg-typing span:nth-child(3) { animation-delay: 0.3s; }

.tg-input { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-top: 1px solid var(--border); background: #14151b; }
.tg-input-icon { color: var(--text-3); font-size: 15px; }
.tg-input-field { flex: 1; padding: 9px 14px; background: #0f1014; border: 1px solid var(--border); border-radius: 20px; color: var(--text-3); font-size: 13px; }
.tg-mic { width: 40px; height: 40px; border-radius: 50%; background: var(--accent); color: #fff; display: grid; place-items: center; border: 0; box-shadow: 0 4px 16px -4px var(--accent-glow); font-size: 15px; }

.tg-presets { display: flex; gap: 8px; flex-wrap: wrap; padding: 10px 18px; background: #0b0c10; border-top: 1px solid var(--border); }
.tg-presets .preset-label { width: 100%; font-family: var(--font-mono); font-size: 10px; color: var(--text-3); letter-spacing: 0.06em; text-transform: uppercase; margin: 0 0 2px; }
.chip { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-2); font-size: 12px; padding: 6px 12px; border-radius: 100px; transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px; }
.chip:hover:not(:disabled) { border-color: var(--accent); color: var(--text); background: var(--accent-soft); }
.chip:disabled { opacity: 0.5; cursor: not-allowed; }
.chip-icon { color: var(--accent-2); font-size: 10px; }

/* Letter inside Telegram */
.letter { background: #0b0b10; border: 1px solid var(--border-strong); border-radius: 12px; padding: 0; overflow: hidden; margin-top: 4px; width: 100%; max-width: 540px; }
.letter-head { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-bottom: 1px solid var(--border); background: var(--bg-elev); font-family: var(--font-mono); font-size: 11px; color: var(--text-3); }
.letter-head-icon { width: 20px; height: 20px; border-radius: 4px; background: var(--accent-soft); color: var(--accent-2); display: grid; place-items: center; font-size: 10px; }
.letter-head-tag { margin-left: auto; color: var(--green); font-size: 10px; padding: 2px 8px; background: rgba(125,216,125,0.1); border-radius: 100px; }
.letter-style { display: flex; background: #0f1014; border-top: 1px solid var(--border); padding: 8px 14px; gap: 6px; }
.letter-style .ls-label { font-family: var(--font-mono); font-size: 10px; color: var(--text-3); letter-spacing: 0.04em; text-transform: uppercase; align-self: center; margin-right: 4px; }
.letter-style button { background: transparent; border: 1px solid var(--border); color: var(--text-2); padding: 4px 10px; border-radius: 100px; font-size: 11px; font-family: var(--font-mono); transition: all 0.15s; }
.letter-style button.on { border-color: var(--accent); color: var(--accent-2); background: var(--accent-soft); }
.letter-body { padding: 16px 18px; font-family: 'Inter', sans-serif; font-size: 13px; line-height: 1.55; color: var(--text); }
.letter-body .lh { color: var(--text-3); font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 2px; }
.letter-body .lrow { margin-bottom: 10px; }
.letter-body .lp { color: var(--text-2); font-size: 13px; margin: 10px 0 0; }
.letter-body .ldots { color: var(--text-3); letter-spacing: 0.1em; margin: 8px 0; }
.letter-body .lreq { margin: 12px 0 0; padding-left: 18px; color: var(--text); }
.letter-body .lreq li { margin-bottom: 4px; font-size: 13px; }
.letter-sig { padding: 10px 18px 14px; font-size: 12px; color: var(--text-2); display: flex; justify-content: space-between; flex-wrap: wrap; gap: 6px; border-top: 1px solid var(--border); }
.letter-actions { display: flex; gap: 6px; padding: 10px 14px; border-top: 1px solid var(--border); background: var(--bg-elev); flex-wrap: wrap; }
.letter-btn { background: transparent; border: 1px solid var(--border-strong); color: var(--text-2); padding: 5px 10px; border-radius: 6px; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.04em; transition: all 0.15s; }
.letter-btn:hover { color: var(--text); border-color: var(--text-3); background: var(--bg-card); }
.letter-btn.primary { border-color: var(--accent); color: var(--accent-2); }
.letter-btn.primary:hover { background: var(--accent-soft); }
.letter-btn.copied { color: var(--green); border-color: var(--green); }

/* ── Phone (Auditor) ─────────────────────────────────────────────────────── */
.auditor-wrap { display: grid; grid-template-columns: 300px 1fr; gap: 40px; align-items: start; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 32px; overflow: hidden; }
@media (max-width: 900px) { .auditor-wrap { grid-template-columns: 1fr; gap: 24px; padding: 20px; } }
@media (max-width: 768px) {
  .auditor-wrap { padding: 16px; gap: 20px; }
  .aud-meta-grid { grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .aud-meta-cell { padding: 8px; }
  .mv { font-size: 13px; }
  .phone { scroll-margin-top: 88px; }
}
@media (max-width: 480px) {
  .aud-meta-grid { grid-template-columns: repeat(2, 1fr); }
}
.phone { position: relative; width: 300px; height: 620px; background: #1a1a22; border-radius: 44px; padding: 14px; margin: 0 auto; box-shadow: 0 30px 60px -20px rgba(0,0,0,0.7), 0 0 0 1px var(--border-strong), inset 0 0 0 2px #0b0b10; }
.phone::before { content: ''; position: absolute; top: 22px; left: 50%; transform: translateX(-50%); width: 100px; height: 28px; background: #05050a; border-radius: 100px; z-index: 2; }
.phone-screen { width: 100%; height: 100%; background: #0a0a0f; border-radius: 32px; overflow: hidden; position: relative; display: flex; flex-direction: column; }
.phone-status { display: flex; justify-content: space-between; padding: 10px 28px 6px; font-family: var(--font-mono); font-size: 10px; color: var(--text); }
.phone-nav { display: flex; align-items: center; gap: 10px; padding: 8px 16px; border-bottom: 1px solid var(--border); }
.phone-nav-title { flex: 1; font-size: 13px; font-weight: 600; }
.phone-nav-meta { font-family: var(--font-mono); font-size: 10px; color: var(--text-3); }
.phone-back { color: var(--accent-2); font-size: 14px; }
.phone-prog { height: 3px; background: var(--border); position: relative; }
.phone-prog-bar { position: absolute; inset: 0 auto 0 0; background: linear-gradient(90deg, var(--accent), var(--accent-2)); transition: width 0.4s; }
.phone-body { flex: 1; overflow-y: auto; padding: 12px; scrollbar-width: none; }
.phone-body::-webkit-scrollbar { display: none; }
.phone-body::-webkit-scrollbar-thumb { background: var(--border-strong); }

.cl-cat { font-family: var(--font-mono); font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.08em; margin: 10px 4px 6px; }
.cl-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: #0f1014; border: 1px solid var(--border); border-radius: 10px; margin-bottom: 6px; }
.cl-check { width: 18px; height: 18px; border-radius: 50%; flex-shrink: 0; display: grid; place-items: center; font-size: 10px; font-weight: 700; }
.cl-check.ok { background: rgba(125,216,125,0.12); color: var(--green); border: 1px solid rgba(125,216,125,0.4); }
.cl-check.ok::after { content: '✓'; }
.cl-check.defect { background: rgba(248,113,113,0.12); color: var(--red); border: 1px solid rgba(248,113,113,0.4); }
.cl-check.defect::after { content: '!'; }
.cl-check.wait { background: transparent; border: 1px dashed var(--border-strong); color: var(--text-3); }
.cl-name { flex: 1; font-size: 12px; color: var(--text); }
.cl-count { font-family: var(--font-mono); font-size: 10px; color: var(--red); }

.dp-hero { position: relative; margin: -12px -12px 0; height: 140px; background: linear-gradient(180deg, #2a1e15 0%, #15110e 100%); display: grid; place-items: center; overflow: hidden; }
.dp-hero::before { content: ''; position: absolute; inset: 0; background-image: repeating-linear-gradient(45deg, transparent 0, transparent 12px, rgba(255,107,53,0.04) 12px, rgba(255,107,53,0.04) 24px); }
.dp-hero-crack { position: absolute; width: 80%; height: 3px; background: linear-gradient(90deg, transparent, rgba(248,113,113,0.7) 30%, rgba(248,113,113,0.9) 50%, rgba(248,113,113,0.7) 70%, transparent); transform: rotate(-6deg); box-shadow: 0 0 8px rgba(248,113,113,0.3); }
.dp-hero-label { position: absolute; top: 10px; left: 12px; font-family: var(--font-mono); font-size: 10px; color: var(--text-3); letter-spacing: 0.08em; text-transform: uppercase; }
.dp-hero-tag { position: absolute; top: 10px; right: 12px; background: var(--red); color: #fff; padding: 2px 8px; border-radius: 100px; font-size: 10px; font-family: var(--font-mono); font-weight: 600; }
.dp-title { padding: 14px 4px 10px; }
.dp-cat { font-size: 13px; color: var(--text); font-weight: 500; }
.dp-norm { font-family: var(--font-mono); font-size: 10px; color: var(--accent-2); margin-top: 2px; }
.dp-plan { background: #0f1014; border: 1px solid var(--border); border-radius: 8px; padding: 10px; margin: 8px 0; position: relative; }
.dp-plan-label { font-family: var(--font-mono); font-size: 9px; color: var(--text-3); letter-spacing: 0.08em; text-transform: uppercase; }
.dp-plan-svg { display: block; width: 100%; margin-top: 6px; }
.dp-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 12px; margin: 8px 0 10px; }
.dp-field .dk { font-family: var(--font-mono); font-size: 9px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.06em; }
.dp-field .dv { font-size: 12px; color: var(--text); }
.dp-note { font-size: 11px; color: var(--text-2); line-height: 1.5; padding: 8px 10px; background: rgba(248,113,113,0.06); border-left: 2px solid var(--red); border-radius: 4px; margin-bottom: 8px; }

.rp-head { padding: 10px 4px; }
.rp-title { font-size: 13px; color: var(--text); font-weight: 500; }
.rp-meta { font-family: var(--font-mono); font-size: 10px; color: var(--text-3); margin-top: 2px; }
.rp-sum { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin: 10px 0; }
.rp-sum-cell { background: #0f1014; border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; }
.rp-sum-k { font-family: var(--font-mono); font-size: 9px; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.06em; }
.rp-sum-v { font-size: 17px; font-weight: 500; margin-top: 2px; color: var(--text); }
.rp-sum-v.crit { color: var(--red); }
.rp-sum-v.sig { color: var(--amber); }
.rp-list { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
.rp-row { display: flex; gap: 8px; padding: 8px 10px; background: #0f1014; border: 1px solid var(--border); border-radius: 8px; font-size: 11px; color: var(--text); }
.rp-row-n { font-family: var(--font-mono); color: var(--text-3); font-size: 10px; }
.rp-row-t { flex: 1; }
.rp-row-sev { font-family: var(--font-mono); font-size: 9px; text-transform: uppercase; letter-spacing: 0.04em; }
.rp-row-sev.significant, .rp-row-sev.значительный { color: var(--amber); }
.rp-row-sev.critical, .rp-row-sev.критический { color: var(--red); }
.rp-row-sev.minor, .rp-row-sev.незначительный { color: var(--text-3); }
.rp-act { padding: 10px 12px; display: grid; gap: 6px; }
.rp-act button { padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border-strong); background: #0f1014; color: var(--text); font-size: 11px; font-family: var(--font-mono); }

const { useState, useRef, useEffect } = React;

function useTypewriter(text, enabled) {
  const [out, setOut] = useState('');
  useEffect(() => {
    if (!enabled || !text) { setOut(text || ''); return; }
    setOut('');
    let i = 0;
    let cancelled = false;
    const tick = () => {
      if (cancelled) return;
      // write a chunk of 3–7 chars with tiny jitter
      const chunk = 3 + Math.floor(Math.random() * 5);
      i = Math.min(i + chunk, text.length);
      setOut(text.slice(0, i));
      if (i < text.length) setTimeout(tick, 14 + Math.random() * 18);
    };
    setTimeout(tick, 120);
    return () => { cancelled = true; };
  }, [text, enabled]);
  return out;
}

function TgMessage({ m, t }) {
  if (m.system && m.text) return <div className="tg-msg in"><div className="tg-bubble system">{m.text}</div></div>;
  if (m.thinking) return <div className="tg-msg in"><div className="tg-typing"><span /><span /><span /></div></div>;
  if (m.voice) {
    return (
      <div className="tg-msg out">
        <div className="tg-bubble" style={{ padding: '8px 10px' }}>
          <div className="tg-voice">
            <button className="tg-voice-play" aria-label="play">▶</button>
            <div className="tg-voice-wave playing">
              {Array.from({ length: 22 }).map((_, i) => (<span key={i} style={{ height: (30 + (i * 7) % 70) + '%' }} />))}
            </div>
            <div className="tg-voice-meta">{m.duration}</div>
          </div>
          <div className="tg-bubble-meta">{m.time} ✓✓</div>
        </div>
      </div>
    );
  }
  if (m.transcript) {
    return (
      <div className="tg-msg in">
        <div className="tg-bubble">
          <div style={{ fontFamily: 'var(--font-mono)', fontSize: '10px', color: 'var(--accent-2)', marginBottom: 4, letterSpacing: '0.04em', textTransform: 'uppercase' }}>
            {m.transcriptLabel}
          </div>
          <div style={{ fontSize: 13, whiteSpace: 'pre-wrap' }}>{m.transcript}</div>
          <div className="tg-bubble-meta">{m.time}</div>
        </div>
      </div>
    );
  }
  return null;
}

function LetterCard({ scenario, styleKey, setStyleKey, t, lang, onText }) {
  const raw = scenario.letters[styleKey] || '';
  const text = useTypewriter(raw, true);
  const [copied, setCopied] = useState(false);
  const copyText = () => {
    try { navigator.clipboard.writeText(raw); } catch(e) {}
    setCopied(true); setTimeout(() => setCopied(false), 1400);
  };
  const styleLabels = lang === 'ru'
    ? { official: 'Официальный', soft: 'Согласовательный', hard: 'Жёсткий' }
    : { official: 'Official', soft: 'Soft', hard: 'Hard' };
  const styleCaption = lang === 'ru' ? 'Стиль' : 'Style';
  const doneLabel = lang === 'ru' ? 'готово' : 'ready';
  const actions = lang === 'ru'
    ? { send: 'Отправить', edit: 'Править', word: 'В Word', copy: 'Копировать', copied: 'Скопировано' }
    : { send: 'Send', edit: 'Edit', word: 'To Word', copy: 'Copy', copied: 'Copied' };
  const H = scenario.header;
  return (
    <div className="letter">
      <div className="letter-head">
        <span className="letter-head-icon">✉</span>
        <span>{H.number} · {H.date}</span>
        <span className="letter-head-tag">{doneLabel}</span>
      </div>
      <div className="letter-style">
        <span className="ls-label">{styleCaption}</span>
        {['official','soft','hard'].map(k => (
          <button key={k} className={styleKey === k ? 'on' : ''} onClick={() => setStyleKey(k)}>{styleLabels[k]}</button>
        ))}
      </div>
      <div className="letter-body">
        <div className="lrow"><div className="lh">{lang === 'ru' ? 'Кому' : 'To'}</div><div>{H.to}</div><div style={{color:'var(--text-2)'}}>{H.attn}</div></div>
        <div className="lrow"><div className="lh">{lang === 'ru' ? 'Тема' : 'Subject'}</div><div>{H.subject}</div></div>
        <div className="letter-text">{text}<span className="cursor-blink">▍</span></div>
      </div>
      <div className="letter-actions">
        <button className="letter-btn primary">▶ {actions.send}</button>
        <button className="letter-btn">✎ {actions.edit}</button>
        <button className="letter-btn">W {actions.word}</button>
        <button className={'letter-btn' + (copied ? ' copied' : '')} onClick={copyText}>{copied ? '✓ ' + actions.copied : '⧉ ' + actions.copy}</button>
      </div>
    </div>
  );
}

function StroyOpsDemo({ t, lang }) {
  const scenarios = (SCENARIOS_DATA[lang] && SCENARIOS_DATA[lang].length) ? SCENARIOS_DATA[lang] : SCENARIOS_DATA.ru;

  useEffect(() => {
    setMessages([{ role: 'bot', system: true, text: t.welcome }]);
    setActiveScenario(null);
  }, [lang, t.welcome]);

  const scrollToBottom = (smooth) => {
    const el = scrollRef.current;
    if (!el) return;
    el.scrollTo({ top: el.scrollHeight, behavior: smooth ? 'smooth' : 'auto' });
  };
  const scrollLetterIntoView = (smooth) => {
    const body = scrollRef.current;
    if (!body) return;
    const letter = body.querySelector('.letter');
    if (!letter) return;
    const top = letter.offsetTop - 12;
    body.scrollTo({ top, behavior: smooth ? 'smooth' : 'auto' });

function IDGeneratorDemo({ t, lang }) {
  const [filled, setFilled] = useState({ contract: false, estimate: false, ks2: false });
  const [state, setState] = useState('idle'); // idle | running | done
  const [progress, setProgress] = useState({});
  const [stageIdx, setStageIdx] = useState(-1);

  const toggle = (id) => {
    if (state === 'running') return;
    setFilled((f) => ({ ...f, [id]: !f[id] }));
  };
  const canRun = filled.contract && filled.estimate && state !== 'running';
  const run = () => {
    if (!canRun) return;
    setState('running'); setStageIdx(0); setProgress({});
    const total = t.stages.length;
    let i = 0;
    const runStage = (k) => {
      const id = t.stages[k].id;
      let pct = 0;
      const iv = setInterval(() => {
        pct += 6 + Math.random() * 10;
        if (pct >= 100) {
          pct = 100;
          clearInterval(iv);
          setProgress((p) => ({ ...p, [id]: pct }));
          if (k + 1 < total) {
            setStageIdx(k + 1);
            setTimeout(() => runStage(k + 1), 260);
          } else {
            setTimeout(() => { setState('done'); setStageIdx(total); }, 420);
          }
        } else {
          setProgress((p) => ({ ...p, [id]: pct }));
        }
      }, 60);
    };
    runStage(0);
  };
  const reset = () => { setFilled({ contract: false, estimate: false, ks2: false }); setState('idle'); setStageIdx(-1); setProgress({}); };

  const stateLabel = state === 'running' ? t.running : state === 'done' ? t.done : (lang === 'ru' ? 'ожидание входа' : 'awaiting input');

  return (
    <div className="idg-wrap">
      <div className="idg-head">
        <div className="idg-head-left">
          <h3 className="aud-title">{t.title}</h3>
          <p className="aud-sub">{t.subtitle}</p>
        </div>
        <div className={'idg-state ' + state}><span className="dot" /> {stateLabel}</div>
      </div>
      <div className="idg-hint">
        <span className="idg-hint-icon">▶</span>
        <span className="idg-hint-text">{t.tryLabel}</span>
      </div>
      <div className={'dropzones' + ((filled[t.dropzones[0].id] || filled[t.dropzones[1].id] || filled[t.dropzones[2].id]) ? ' touched' : '')}>
        {t.dropzones.map((dz, idx) => {
          const anyTouched = filled[t.dropzones[0].id] || filled[t.dropzones[1].id] || filled[t.dropzones[2].id];
          const isFirstEmpty = !anyTouched && idx === 0;
          return (
            <div key={dz.id} className={'dz' + (filled[dz.id] ? ' filled' : '') + (isFirstEmpty ? ' empty-cta' : '')} onClick={() => toggle(dz.id)}>
              <div className="dz-label"><span>{dz.label}</span><span className="dz-accept">{dz.accept}</span></div>
              <div className="dz-body">
                <div className="dz-icon">{filled[dz.id] ? '✓' : '⇧'}</div>
                {filled[dz.id] ? (
                  <div>
                    <div className="dz-file-name">{dz.sample}</div>
                    <div className="dz-file-size">{dz.size}</div>
                  </div>
                ) : (
                  <div className="dz-empty">
                    <span className="dz-empty-cta">{lang === 'ru' ? '▶ Загрузить демо-файл' : '▶ Load demo file'}</span>
                    <span className="dz-empty-sub">{lang === 'ru' ? 'или перетащите сюда' : 'or drop here'}</span>
                  </div>
                )}
              </div>
            </div>
          );
        })}
      </div>
      <div className="idg-run-row">
        <button className={'btn ' + (canRun ? 'btn-primary' : 'btn-ghost')} disabled={!canRun} onClick={run} style={{ opacity: canRun ? 1 : 0.5 }}>▶ {t.run}</button>
        {state !== 'idle' && <button className="btn btn-ghost" onClick={reset}>⟲ {lang === 'ru' ? 'Сбросить' : 'Reset'}</button>}
      </div>
      <div className="idg-pipeline">
        {t.stages.map((s, i) => {
          const pct = progress[s.id] || 0;
          const cls = stageIdx === i && state === 'running' ? 'running' : (pct >= 100 ? 'done' : '');
          return (
            <div key={s.id} className={'pipe-stage ' + cls}>
              <div className="pipe-top">
                <div className="pipe-check" data-n={i + 1} />
                <div className="pipe-name">{s.name}</div>
              </div>
              <div className="pipe-detail">{s.detail}</div>
              <div className="pipe-bar"><div className="pipe-bar-fill" style={{ width: pct + '%' }} /></div>
            </div>
          );
        })}
      </div>
      <div className="idg-outputs">
        {t.outputs.map((o, i) => (
          <div key={i} className={'out-card' + (state === 'done' ? ' ready' : '')}>
            <div className="out-code">{o.code}</div>
            <div className="out-name">{o.name}</div>
            <div className="out-count">{o.count}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

          alt="AI robot"
          auto-rotate
          auto-rotate-delay="0"

      forceShow();
      setTimeout(forceShow, 0);
      setTimeout(forceShow, 500);
      setTimeout(forceShow, 1500);
      el.addEventListener('load', () => {
        if (cancelled) return;
        setMvReady(true);
        el.classList.add('ready');
        forceShow();
        try { if (typeof el.dismissPoster === 'function') el.dismissPoster(); } catch(e) {}
      });
      el.addEventListener('error', () => { if (!cancelled) setMvError(true); });
    };
    // Wait for model-viewer custom element to be defined, then mount
    if (window.customElements && customElements.get('model-viewer')) {
      mount();
    } else if (window.customElements && customElements.whenDefined) {
      customElements.whenDefined('model-viewer').then(() => { if (!cancelled) mount(); });
      // Fallback timeout: if the component never registers in 12s, show error
      setTimeout(() => { if (!cancelled && !customElements.get('model-viewer')) setMvError(true); }, 12000);
    } else {
      mount();
    }
    return () => { cancelled = true; };
  }, []);

  return (
    <div className="robot-stage">
      <div className="robot-glow" />
      <div ref={hostRef} className={'mv-host' + (mvReady ? ' ready' : '')} style={{ position: 'absolute', inset: 0, display: mvError ? 'none' : 'block' }} />
      {mvError && (
        <div className="mv-error-state">
          <div className="mv-error-icon">!</div>
          <div className="mv-error-text">3D-модель не загрузилась</div>
        </div>
      )}
    </div>
  );
}

function statusClass(s) {
  const k = (s || '').toString().toLowerCase();

  if (k === 'в работе' || k === 'active' || k === 'beta') return 's-beta';
  if (k.includes('разработ') || k.includes('development')) return 's-dev';
  if (k.includes('план') || k.includes('planned')) return 's-planned';
  return 's-planned';
}

function Projects({ t, labels }) {

      setTimeout(() => detailRef.current && detailRef.current.scrollIntoView({ behavior: 'smooth', block: 'start' }), 50);
    }
  };
  const go = (i) => { setActive((i + total) % total); setUserInteracted(true); scrollToDetail(); };
  const status = item.status || '';
  const statusK = statusClass(status);
  return (

                <span className="project-tag">{p.tag}</span>
                <span className={'project-status ' + statusClass(p.status)}>{p.status}</span>
                <span className="project-arrow">→</span>

          <div className="bento-head">
            <span className="project-code-lg">{item.code}</span>
            <div style={{flex:1}}>
              <h3 className="project-title">{item.name}</h3>
              <div className="project-tag">{item.tag}</div>
            </div>
            <div className="bento-status">
              <span className={'st-pill ' + statusK}><span className="st-dot" />{status}</span>
              <div className="project-progress"><span className="pp-cur">{pad(active + 1)}</span> / {pad(total)}</div>
            </div>
          </div>
          <div className="bento-grid">
            <div className="bento-card bento-problem">
              <div className="bento-label"><span className="bl-mark bm-red" />{labels.problem}</div>
              <div className="bento-text">{item.problem}</div>
            </div>
            <div className="bento-card bento-solution">

              <div className="bento-text">{item.result}</div>

  <script type="text/babel">
const { useState, useEffect } = React;

const ACCENTS = [
  { hex: '#FF6B35', soft: 'rgba(255,107,53,0.12)', glow: 'rgba(255,107,53,0.35)', pair: '#FF9770' },
  { hex: '#7C5CFF', soft: 'rgba(124,92,255,0.12)', glow: 'rgba(124,92,255,0.35)', pair: '#A78BFA' },
  { hex: '#00D4FF', soft: 'rgba(0,212,255,0.12)', glow: 'rgba(0,212,255,0.35)', pair: '#7DE8FF' },
  { hex: '#7DD87D', soft: 'rgba(125,216,125,0.12)', glow: 'rgba(125,216,125,0.35)', pair: '#A3E8A3' },
];

const LABELS = {
  ru: { problem: 'Проблема', solution: 'Решение', result: 'Результат', selectHint: '← выберите проект', prev: 'Предыдущий', next: 'Следующий' },
  en: { problem: 'Problem', solution: 'Solution', result: 'Result', selectHint: '← select a project', prev: 'Previous', next: 'Next' },
};

function applyAccent(hex) {
  const a = ACCENTS.find(x => x.hex.toLowerCase() === hex.toLowerCase()) || ACCENTS[0];
  document.documentElement.style.setProperty('--accent', a.hex);
  document.documentElement.style.setProperty('--accent-2', a.pair);
  document.documentElement.style.setProperty('--accent-soft', a.soft);
  document.documentElement.style.setProperty('--accent-glow', a.glow);
}

function App() {
  const [lang, setLang] = useState(TWEAK_DEFAULTS.lang || 'ru');
  const [variant, setVariant] = useState(TWEAK_DEFAULTS.heroVariant || 'B');
  const [accent, setAccent] = useState(TWEAK_DEFAULTS.accent || '#FF6B35');
  const [tweaksOpen, setTweaksOpen] = useState(false);

  useEffect(() => { applyAccent(accent); }, [accent]);
  useEffect(() => { document.documentElement.lang = lang; }, [lang]);
  useEffect(() => {
    const onMessage = (e) => {
      if (!e.data || typeof e.data !== 'object') return;
      if (e.data.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', onMessage);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMessage);
  }, []);

  const persist = (key, value) => {
    try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: value } }, '*'); } catch (err) {}
  };

  const t = CONTENT[lang];
  return (
    <React.Fragment>
      <Nav t={t} lang={lang} setLang={(l) => { setLang(l); persist('lang', l); }} />
      <Hero t={t} variant={variant} />
      <About t={t} />
      <Projects t={t} labels={LABELS[lang]} />
      <DemoSection t={t} lang={lang} />
      <SystemThinking t={t} />
      <Stack t={t} />
      <Pricing t={t} />
      <Gov t={t} />
      <Contact t={t} />
      <Footer t={t} />
      {tweaksOpen && (
        <div className="tweaks-panel">
          <div className="tweaks-head"><span className="sys-dot" /> Tweaks</div>
          <div className="tweak-row">
            <div className="tweak-label">Язык</div>
            <div className="tweak-seg">
              {['ru', 'en'].map(l => (
                <button key={l} className={lang === l ? 'on' : ''} onClick={() => { setLang(l); persist('lang', l); }}>{l.toUpperCase()}</button>
              ))}
            </div>
          </div>
          <div className="tweak-row">
            <div className="tweak-label">Hero</div>
            <div className="tweak-seg">
              {['A', 'B'].map(v => (
                <button key={v} className={variant === v ? 'on' : ''} onClick={() => { setVariant(v); persist('heroVariant', v); }}>
                  {v === 'A' ? 'Сплит' : 'Центр'}
                </button>
              ))}
            </div>
          </div>
          <div className="tweak-row">
            <div className="tweak-label">Акцент</div>
            <div className="tweak-swatches">
              {ACCENTS.map(a => (
                <button key={a.hex} className={'tweak-swatch' + (accent.toLowerCase() === a.hex.toLowerCase() ? ' on' : '')} style={{ background: a.hex }} onClick={() => { setAccent(a.hex); persist('accent', a.hex); }} aria-label={a.hex} />
              ))}
            </div>
          </div>
        </div>
      )}
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
